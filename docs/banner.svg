<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <!-- Background -->
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Subtle grid lines in background -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#21262D" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#21262D" stroke-width="0.5" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#21262D" stroke-width="0.5" opacity="0.3"/>
  <line x1="800" y1="0" x2="800" y2="400" stroke="#21262D" stroke-width="0.5" opacity="0.3"/>

  <!-- Pulse rings centered at left area -->
  <circle cx="200" cy="200" r="55" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.18"/>
  <circle cx="200" cy="200" r="95" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.12"/>
  <circle cx="200" cy="200" r="138" fill="none" stroke="#F59E0B" stroke-width="0.8" opacity="0.08"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.05"/>
  <circle cx="200" cy="200" r="235" fill="none" stroke="#58A6FF" stroke-width="0.5" opacity="0.04"/>

  <!-- Blue accent rings -->
  <circle cx="200" cy="200" r="75" fill="none" stroke="#58A6FF" stroke-width="0.7" opacity="0.07"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#58A6FF" stroke-width="0.5" opacity="0.05"/>

  <!-- Pulsar dot (glowing effect via layered circles) -->
  <circle cx="200" cy="200" r="18" fill="#F59E0B" opacity="0.08"/>
  <circle cx="200" cy="200" r="12" fill="#F59E0B" opacity="0.15"/>
  <circle cx="200" cy="200" r="8" fill="#F59E0B" opacity="0.9"/>
  <circle cx="200" cy="200" r="4" fill="#FEF3C7"/>

  <!-- Signal beam line from pulsar to text area -->
  <line x1="208" y1="200" x2="355" y2="200" stroke="#F59E0B" stroke-width="1" opacity="0.35"/>
  <!-- Small tick marks on signal line -->
  <line x1="240" y1="196" x2="240" y2="204" stroke="#F59E0B" stroke-width="0.8" opacity="0.4"/>
  <line x1="270" y1="197" x2="270" y2="203" stroke="#F59E0B" stroke-width="0.8" opacity="0.3"/>
  <line x1="300" y1="198" x2="300" y2="202" stroke="#F59E0B" stroke-width="0.8" opacity="0.25"/>
  <line x1="325" y1="199" x2="325" y2="201" stroke="#F59E0B" stroke-width="0.8" opacity="0.2"/>

  <!-- Decorative corner accent top-right -->
  <line x1="1100" y1="20" x2="1180" y2="20" stroke="#21262D" stroke-width="1" opacity="0.8"/>
  <line x1="1180" y1="20" x2="1180" y2="80" stroke="#21262D" stroke-width="1" opacity="0.8"/>

  <!-- Main title: "Pulsar" -->
  <text x="370" y="178"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="74"
        font-weight="700"
        fill="#F0F6FC"
        letter-spacing="-1.5">Pulsar</text>

  <!-- Chinese subtitle inline: "· 照見" -->
  <text x="620" y="178"
        font-family="'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif"
        font-size="50"
        font-weight="300"
        fill="#F59E0B"
        opacity="0.92">&#xB7; &#x7167;&#x898B;</text>

  <!-- Subtitle line -->
  <text x="370" y="228"
        font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="19"
        font-weight="400"
        fill="#8B949E"
        letter-spacing="0.8">Automated Domain Intelligence Pipeline</text>

  <!-- Thin divider line -->
  <line x1="370" y1="258" x2="920" y2="258" stroke="#21262D" stroke-width="1"/>

  <!-- Pipeline stages row -->
  <text x="370" y="293"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="14"
        fill="#3FB950"
        opacity="0.85">RSS</text>
  <text x="412" y="293"
        font-family="monospace"
        font-size="14"
        fill="#8B949E">&#x2192;</text>
  <text x="432" y="293"
        font-family="'SF Mono', monospace"
        font-size="14"
        fill="#F59E0B"
        opacity="0.85">Rate &#x26A1;&#x1F527;&#x1F4D6;</text>
  <text x="548" y="293"
        font-family="monospace"
        font-size="14"
        fill="#8B949E">&#x2192;</text>
  <text x="568" y="293"
        font-family="'SF Mono', monospace"
        font-size="14"
        fill="#58A6FF"
        opacity="0.85">LLM Analyze</text>
  <text x="683" y="293"
        font-family="monospace"
        font-size="14"
        fill="#8B949E">&#x2192;</text>
  <text x="703" y="293"
        font-family="'SF Mono', monospace"
        font-size="14"
        fill="#BC8CFF"
        opacity="0.85">GitHub + Telegram</text>

  <!-- Bottom stats line -->
  <text x="370" y="345"
        font-family="'SF Pro Text', Arial, sans-serif"
        font-size="13"
        fill="#6E7681">55 scripts&#x2002;&#xB7;&#x2002;33 cron jobs&#x2002;&#xB7;&#x2002;2 output repos&#x2002;&#xB7;&#x2002;self-healing watchdog</text>

  <!-- Version / build tag bottom-right -->
  <text x="1180" y="385"
        font-family="'SF Mono', monospace"
        font-size="11"
        fill="#30363D"
        text-anchor="end">v1.0</text>
</svg>